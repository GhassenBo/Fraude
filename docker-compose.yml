version: '3.9'

services:

  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    container_name: frauddetect-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: frauddetect
      POSTGRES_USER: ${DB_USER:-frauddetect}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-frauddetect}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Spring Boot Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: frauddetect-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://db:5432/frauddetect
      DATABASE_USER: ${DB_USER:-frauddetect}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend + Nginx ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frauddetect-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro          # Mount SSL certs for HTTPS
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
