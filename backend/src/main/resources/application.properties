server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
logging.level.com.frauddetect=DEBUG

# CORS
app.cors.allowed-origins=http://localhost:3000

# JWT
app.jwt.secret=changeme-use-a-long-random-secret-in-production-min-256-bits
app.jwt.expiration=86400000

# H2 (local dev)
spring.datasource.url=jdbc:h2:mem:frauddetect
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Stripe
stripe.api.key=sk_test_REPLACE_WITH_YOUR_STRIPE_SECRET_KEY
stripe.webhook.secret=whsec_REPLACE_WITH_YOUR_WEBHOOK_SECRET
stripe.price.id=price_REPLACE_WITH_YOUR_PRICE_ID
app.base.url=http://localhost:3000

# Free tier limit
app.free.documents=10

# OpenAI (GPT-4o) — optional, leave blank to disable AI analysis and Vision extraction
openai.api.key=
openai.model=gpt-4o

# INSEE Sirene API — optionnel, laisser vide pour désactiver la vérification en ligne
# Créer un compte sur https://portail-api.insee.fr et activer l'API Sirene V3
# Mode simple   : définir INSEE_API_KEY (clé API directe)
# Mode OAuth2   : définir INSEE_CONSUMER_KEY + INSEE_CONSUMER_SECRET
insee.api.key=COLLE_TA_CLE_ICI
insee.consumer.key=${INSEE_CONSUMER_KEY:}
insee.consumer.secret=${INSEE_CONSUMER_SECRET:}
